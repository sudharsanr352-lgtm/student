<!DOCTYPE html>
<html><head><title>Edit Student</title><style>body{font-family:Arial;margin:20px;}input,textarea,select{width:100%;margin:5px 0;padding:8px;}button{padding:8px 16px;}</style></head>
<body>
<div class="container" style="max-width:500px;margin:auto;">
    <h2>Edit Student</h2>
    <input type="hidden" id="regNo">
    <label>Name:</label><input type="text" id="name"><br>
    <label>Course:</label><select id="course"><option>M.Tech SE</option><option>M.Tech AI</option><option>M.Tech DS</option></select><br>
    <label>Attendance:</label><input type="number" id="attendance"><br>
    <label>Grades (JSON):</label><textarea id="grades" rows="3"></textarea><br>
    <button onclick="updateStudent()">Update</button>
    <button onclick="location.href='/all-students'">Cancel</button>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const regNo = urlParams.get('reg_no');
    fetch(`/api/students/${regNo}/profile`).then(res=>res.json()).then(data=>{
        document.getElementById('regNo').value = data.reg_no;
        document.getElementById('name').value = data.name;
        document.getElementById('course').value = data.course;
        document.getElementById('attendance').value = data.attendance;
        document.getElementById('grades').value = JSON.stringify(data.grades || []);
    });
    function updateStudent() {
        fetch(`/api/students/${regNo}`, {
            method:'PUT',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                name: document.getElementById('name').value,
                course: document.getElementById('course').value,
                attendance: parseInt(document.getElementById('attendance').value),
                grades: JSON.parse(document.getElementById('grades').value)
            })
        }).then(()=> alert('Updated!') || (window.location.href='/all-students'));
    }
</script>
</body></html>
