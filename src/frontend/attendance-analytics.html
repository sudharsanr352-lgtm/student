<!DOCTYPE html>
<html><head><title>Attendance Analytics</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>
    body{font-family:Arial;margin:20px;background:#f5f5f5;}
    .container{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:8px;}
    canvas{max-height:300px;}
</style></head>
<body>
<div class="container">
    <button onclick="location.href='/dashboard.html'">← Back</button>
    <h2>Attendance Analytics</h2>
    <canvas id="attChart"></canvas>
    <h3>Students Below 75%</h3>
    <table id="lowTable"><thead><tr><th>Name</th><th>Reg No</th><th>Attendance</th></tr></thead><tbody></tbody></table>
</div>
<script>
    fetch('/api/students').then(res=>res.json()).then(students=>{
        const below75 = students.filter(s=>s.attendance<75);
        const tbody = document.querySelector('#lowTable tbody');
        tbody.innerHTML = '';
        below75.forEach(s=>tbody.innerHTML+=`<tr><td><a href="/student/${s.reg_no}">${s.name}</a></td><td>${s.reg_no}</td><td>${s.attendance}%</td></tr>`);
        const ctx = document.getElementById('attChart').getContext('2d');
        new Chart(ctx,{type:'bar',data:{labels:students.map(s=>s.name),datasets:[{label:'Attendance %',data:students.map(s=>s.attendance),backgroundColor:'#e67e22'}]}});
    });
</script>
</body></html>
