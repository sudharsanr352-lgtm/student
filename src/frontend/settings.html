<!DOCTYPE html>
<html><head><title>Settings</title><style>body{font-family:Arial;margin:20px;background:#f5f5f5;}.container{max-width:500px;margin:auto;background:white;padding:20px;border-radius:8px;}button{margin-top:10px;}</style></head>
<body>
<div class="container">
    <button onclick="location.href='/dashboard.html'">← Back</button>
    <h2>Settings</h2>
    <label>Dashboard Title:</label><input type="text" id="titleInput" placeholder="Enter title"><br>
    <label>Default Theme:</label>
    <select id="themeSelect"><option value="light">Light</option><option value="dark">Dark</option></select><br>
    <button onclick="saveSettings()">Save</button>
    <p id="msg"></p>
</div>
<script>
    function saveSettings() {
        const title = document.getElementById('titleInput').value;
        const theme = document.getElementById('themeSelect').value;
        if(title) localStorage.setItem('appTitle', title);
        localStorage.setItem('theme', theme);
        document.getElementById('msg').innerText = 'Settings saved! Refresh dashboard to see changes.';
        if(theme==='dark') document.body.classList.add('dark');
        else document.body.classList.remove('dark');
    }
    if(localStorage.getItem('theme')==='dark') document.body.classList.add('dark');
    document.getElementById('titleInput').value = localStorage.getItem('appTitle') || '';
</script>
</body></html>
