name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate-config-items:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          test -f src/frontend/login.html && echo "✓ login.html"
          test -f src/frontend/dashboard.html && echo "✓ dashboard.html"
          test -f src/frontend/students.html && echo "✓ students.html"
          test -f src/backend/app.py && echo "✓ app.py"
          test -f database/schema.sql && echo "✓ schema.sql"
          test -f docs/requirements.md && echo "✓ requirements.md"
          echo "All CIs present."

  build-summary:
    runs-on: ubuntu-latest
    needs: validate-config-items
    steps:
      - name: Build summary
        run: |
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Build completed successfully."
